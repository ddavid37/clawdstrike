name: Desktop Artifacts (Unsigned)

on:
  workflow_dispatch:
    inputs:
      ref:
        description: "Git ref to build (branch, tag, or SHA)"
        required: false
        default: ""
        type: string

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  build-macos:
    name: Build macOS Desktop (Unsigned)
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ inputs.ref || github.sha }}

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: npm
          cache-dependency-path: apps/desktop/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install desktop dependencies
        run: npm --prefix apps/desktop ci

      - name: Typecheck desktop frontend
        run: npm --prefix apps/desktop run typecheck

      - name: Build unsigned desktop bundles
        run: npm --prefix apps/desktop run tauri build -- --bundles app,dmg

      - name: Collect artifacts
        shell: bash
        run: |
          set -euo pipefail

          BUNDLE_DIR="apps/desktop/src-tauri/target/release/bundle"
          ARTIFACT_DIR="artifacts/desktop-macos-unsigned"

          mkdir -p "$ARTIFACT_DIR"

          mapfile -t dmg_files < <(find "$BUNDLE_DIR" -type f -name "*.dmg")
          if [[ "${#dmg_files[@]}" -eq 0 ]]; then
            echo "No .dmg artifacts found in $BUNDLE_DIR" >&2
            exit 1
          fi
          for dmg in "${dmg_files[@]}"; do
            cp "$dmg" "$ARTIFACT_DIR/"
          done

          mapfile -t app_dirs < <(find "$BUNDLE_DIR" -type d -name "*.app")
          if [[ "${#app_dirs[@]}" -eq 0 ]]; then
            echo "No .app bundles found in $BUNDLE_DIR" >&2
            exit 1
          fi
          for app in "${app_dirs[@]}"; do
            app_parent="$(dirname "$app")"
            app_base="$(basename "$app")"
            tar -C "$app_parent" -czf "$ARTIFACT_DIR/${app_base}.tar.gz" "$app_base"
          done

          (
            cd "$ARTIFACT_DIR"
            shasum -a 256 * > SHA256SUMS
          )

          echo "Artifacts prepared in $ARTIFACT_DIR"
          ls -lh "$ARTIFACT_DIR"

      - name: Upload artifacts
        uses: actions/upload-artifact@v6
        with:
          name: desktop-macos-unsigned-${{ github.run_number }}
          path: artifacts/desktop-macos-unsigned/*
          if-no-files-found: error

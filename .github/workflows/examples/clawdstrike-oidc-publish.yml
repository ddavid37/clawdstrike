name: Publish Clawdstrike Package (OIDC)

on:
  release:
    types: [published]

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install clawdstrike CLI
        run: cargo install clawdstrike-cli

      - name: Publish with OIDC
        run: clawdstrike pkg publish --oidc

# Clawdstrike Policy Check
#
# Validates security policies on pull requests that modify policy files.
# Copy this file to your repo's .github/workflows/ directory to enable.
#
# Features:
#   - Lints all policy YAML files for errors, warnings, and best practices
#   - Outputs SARIF for GitHub Security tab annotations
#   - Verifies package archive integrity when a package manifest exists
#   - Runs policy test suites with coverage checks

name: Clawdstrike Policy Check

on:
  pull_request:
    paths:
      - "policies/**"
      - "rulesets/**"
      - "*.yaml"
      - "clawdstrike-pkg.toml"

jobs:
  lint:
    name: Lint Policies
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Clawdstrike CLI
        run: cargo install clawdstrike-cli

      - name: Lint policies
        run: |
          exit_code=0
          for f in policies/*.yaml rulesets/*.yaml; do
            [ -f "$f" ] || continue
            echo "::group::Linting $f"
            if ! clawdstrike policy lint "$f" --strict; then
              exit_code=1
            fi
            echo "::endgroup::"
          done
          exit $exit_code

      - name: Lint policies (SARIF)
        if: always()
        run: |
          mkdir -p sarif-results
          for f in policies/*.yaml rulesets/*.yaml; do
            [ -f "$f" ] || continue
            basename=$(basename "$f" .yaml)
            clawdstrike policy lint "$f" --sarif > "sarif-results/${basename}.sarif" || true
          done

      - name: Upload SARIF results
        if: always()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: sarif-results/
        continue-on-error: true

      - name: Verify package archive integrity
        if: hashFiles('clawdstrike-pkg.toml') != ''
        run: |
          clawdstrike pkg pack
          for f in *.cpkg; do
            clawdstrike guard validate "$f"
          done

  test:
    name: Policy Tests
    runs-on: ubuntu-latest
    if: hashFiles('tests/policy-tests.yaml') != '' || hashFiles('policy-tests.yaml') != ''
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install Clawdstrike CLI
        run: cargo install clawdstrike-cli

      - name: Find and run policy tests
        run: |
          test_file=""
          if [ -f "tests/policy-tests.yaml" ]; then
            test_file="tests/policy-tests.yaml"
          elif [ -f "policy-tests.yaml" ]; then
            test_file="policy-tests.yaml"
          fi

          if [ -n "$test_file" ]; then
            clawdstrike policy test "$test_file" --coverage --min-coverage 80
          else
            echo "No policy test file found, skipping."
          fi

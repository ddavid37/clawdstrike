name: Helm Cluster Smoke

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened, labeled, unlabeled, ready_for_review]
    paths:
      - "infra/deploy/helm/clawdstrike/**"
      - "scripts/helm-e2e-smoke.sh"
      - ".github/workflows/helm-cluster-smoke.yml"
  workflow_dispatch:
    inputs:
      chart_version:
        description: "Optional chart version override (defaults to PR/run derived version)"
        required: false
        type: string
      pr_number:
        description: "PR number for namespace/version naming when run manually"
        required: false
        type: string

permissions:
  contents: read
  id-token: write
  packages: write

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
  EKS_CLUSTER_NAME: ${{ vars.EKS_CLUSTER_NAME }}
  EKS_ROLE_ARN: ${{ secrets.AWS_OIDC_ROLE_ARN }}
  HELM_OCI_REPO_CI: oci://ghcr.io/backbay-labs/clawdstrike/helm-ci

jobs:
  gate:
    name: Determine Execution Gate
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.gate.outputs.should_run }}
      reason: ${{ steps.gate.outputs.reason }}
      chart_version: ${{ steps.gate.outputs.chart_version }}
      namespace_suffix: ${{ steps.gate.outputs.namespace_suffix }}
    steps:
      - name: Evaluate merge-candidate gate
        id: gate
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          IS_FORK: ${{ github.event.pull_request.head.repo.fork || false }}
          HAS_MERGE_CANDIDATE_LABEL: ${{ contains(github.event.pull_request.labels.*.name, 'merge-candidate') }}
          PR_NUMBER: ${{ github.event.pull_request.number || github.event.inputs.pr_number || '0' }}
          RUN_NUMBER: ${{ github.run_number }}
          RUN_ATTEMPT: ${{ github.run_attempt }}
          INPUT_CHART_VERSION: ${{ github.event.inputs.chart_version || '' }}
        run: |
          set -euo pipefail
          should_run=true
          reason="gate passed"
          chart_version=""
          namespace_suffix=""

          if [[ "$EVENT_NAME" == "pull_request" ]]; then
            if [[ "$IS_FORK" == "true" ]]; then
              should_run=false
              reason="skipping fork pull request (secrets/OIDC disabled)"
            elif [[ "$HAS_MERGE_CANDIDATE_LABEL" != "true" ]]; then
              should_run=false
              reason="missing merge-candidate label"
            fi
          fi

          if [[ -n "$INPUT_CHART_VERSION" ]]; then
            chart_version="$INPUT_CHART_VERSION"
          elif [[ "$EVENT_NAME" == "pull_request" ]]; then
            chart_version="0.0.0-pr.${PR_NUMBER}.${RUN_NUMBER}"
          else
            chart_version="0.0.0-manual.${RUN_NUMBER}"
          fi

          if [[ "$EVENT_NAME" == "pull_request" ]]; then
            namespace_suffix="pr-${PR_NUMBER}-${RUN_ATTEMPT}"
          else
            namespace_suffix="manual-${RUN_NUMBER}-${RUN_ATTEMPT}"
          fi

          echo "should_run=${should_run}" >>"$GITHUB_OUTPUT"
          echo "reason=${reason}" >>"$GITHUB_OUTPUT"
          echo "chart_version=${chart_version}" >>"$GITHUB_OUTPUT"
          echo "namespace_suffix=${namespace_suffix}" >>"$GITHUB_OUTPUT"

  skipped:
    name: Smoke Gate Skipped
    runs-on: ubuntu-latest
    needs: gate
    if: needs.gate.outputs.should_run != 'true'
    steps:
      - name: Emit skip reason
        run: |
          echo "Helm cluster smoke skipped: ${{ needs.gate.outputs.reason }}"
          {
            echo "## Helm Cluster Smoke"
            echo ""
            echo "- status: skipped"
            echo "- reason: ${{ needs.gate.outputs.reason }}"
          } >> "$GITHUB_STEP_SUMMARY"

  smoke:
    name: EKS OCI Smoke
    runs-on: ubuntu-latest
    needs: gate
    if: needs.gate.outputs.should_run == 'true'
    steps:
      - uses: actions/checkout@v6

      - name: Setup Helm
        uses: azure/setup-helm@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.EKS_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Configure kubectl for EKS
        run: aws eks update-kubeconfig --name "$EKS_CLUSTER_NAME" --region "$AWS_REGION"

      - name: Login to GHCR (helm)
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
        run: echo "$GITHUB_TOKEN" | helm registry login ghcr.io --username "$GITHUB_ACTOR" --password-stdin

      - name: Package PR-scoped chart
        run: scripts/release-helm-chart.sh "${{ needs.gate.outputs.chart_version }}"

      - name: Push PR-scoped chart to OCI test repo
        run: helm push "dist/helm/clawdstrike-${{ needs.gate.outputs.chart_version }}.tgz" "$HELM_OCI_REPO_CI"

      - name: Run cluster smoke script
        env:
          GHCR_PULL_USERNAME: ${{ github.actor }}
          GHCR_PULL_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ARTIFACT_DIR="$RUNNER_TEMP/helm-cluster-smoke"
          NAMESPACE="clawdstrike-smoke-${{ needs.gate.outputs.namespace_suffix }}"
          scripts/helm-e2e-smoke.sh \
            --chart-ref "oci://ghcr.io/backbay-labs/clawdstrike/helm-ci/clawdstrike" \
            --chart-version "${{ needs.gate.outputs.chart_version }}" \
            --release "clawdstrike-smoke" \
            --namespace "$NAMESPACE" \
            --values "infra/deploy/helm/clawdstrike/ci/cluster-smoke-values.yaml" \
            --artifact-dir "$ARTIFACT_DIR"

      - name: Upload smoke artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: helm-cluster-smoke-${{ github.run_id }}
          path: ${{ runner.temp }}/helm-cluster-smoke

      - name: Append summary
        if: always()
        run: |
          SUMMARY_FILE="$RUNNER_TEMP/helm-cluster-smoke/summary.md"
          if [[ -f "$SUMMARY_FILE" ]]; then
            cat "$SUMMARY_FILE" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "No smoke summary produced." >> "$GITHUB_STEP_SUMMARY"
          fi

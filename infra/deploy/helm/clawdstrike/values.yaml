# -- Global settings
global:
  # -- Image pull policy
  imagePullPolicy: IfNotPresent
  # -- Image pull secrets
  imagePullSecrets: []
  # -- Optional node selector applied to all workloads
  nodeSelector: {}
  # -- Optional tolerations applied to all workloads
  tolerations: []
  # -- Override namespace (defaults to Release.Namespace)
  namespace: ""

# -- Override chart name
nameOverride: ""
# -- Override full release name
fullnameOverride: ""

# -- Namespace creation
namespace:
  create: true
  name: "clawdstrike-system"

# ---------------------------------------------------------------------------
# NATS JetStream
# ---------------------------------------------------------------------------
nats:
  # -- Enable bundled NATS deployment
  enabled: true
  # -- Use an external NATS cluster instead of deploying one
  external:
    enabled: false
    url: ""
  image:
    repository: nats
    tag: "2.10-alpine"
  replicas: 1
  jetstream:
    enabled: true
    storage:
      size: 10Gi
      storageClassName: ""
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: "1"
      memory: 1Gi
  monitoring:
    enabled: true
    port: 8222

# ---------------------------------------------------------------------------
# Spine services (checkpointer, witness, proofs-api)
# ---------------------------------------------------------------------------
spine:
  enabled: true
  image:
    repository: ghcr.io/backbay-labs/clawdstrike/spine
    # -- Overrides appVersion for spine images
    tag: ""
  env:
    RUST_LOG: "info,spine=debug"
  secrets:
    # -- Name of existing Secret containing SPINE_LOG_SEED_HEX and SPINE_WITNESS_SEED_HEX
    existingSecret: ""

  checkpointer:
    enabled: true
    replicas: 1
    # -- Hex-encoded 32-byte Ed25519 seed for spine-checkpointer (SPINE_LOG_SEED_HEX)
    logSeedHex: ""
    # -- JetStream replication factor to request when creating Spine streams
    streamReplicas: 1
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 500m
        memory: 256Mi

  witness:
    enabled: true
    replicas: 1
    # -- Hex-encoded 32-byte Ed25519 seed for spine-witness (SPINE_WITNESS_SEED_HEX)
    seedHex: ""
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 250m
        memory: 128Mi

  proofsApi:
    enabled: true
    replicas: 1
    port: 8080
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 500m
        memory: 256Mi
    service:
      type: ClusterIP
      port: 8080

# ---------------------------------------------------------------------------
# hushd (enforcement daemon)
# ---------------------------------------------------------------------------
hushd:
  enabled: true
  image:
    repository: ghcr.io/backbay-labs/clawdstrike/hushd
    tag: ""
  replicas: 1
  port: 9876
  config:
    ruleset: "default"
    logLevel: "info"
  auth:
    enabled: true
    # -- Name of existing Secret containing CLAWDSTRIKE_API_KEY and CLAWDSTRIKE_ADMIN_KEY
    existingSecret: ""
    # -- API key (only used if existingSecret is empty; stored in auto-generated Secret)
    apiKey: ""
    adminKey: ""
  persistence:
    enabled: true
    size: 1Gi
    storageClassName: ""
  resources:
    requests:
      cpu: 50m
      memory: 64Mi
    limits:
      cpu: 500m
      memory: 256Mi
  service:
    type: ClusterIP
    port: 9876
  # -- Topology spread constraints for hushd pods (e.g., spread across AZs)
  topologySpreadConstraints: []
  # - maxSkew: 1
  #   topologyKey: topology.kubernetes.io/zone
  #   whenUnsatisfiable: DoNotSchedule
  #   labelSelector:
  #     matchLabels:
  #       app.kubernetes.io/component: hushd
  # -- Affinity rules for hushd pods (e.g., pod anti-affinity)
  affinity: {}
  # podAntiAffinity:
  #   preferredDuringSchedulingIgnoredDuringExecution:
  #     - weight: 100
  #       podAffinityTerm:
  #         labelSelector:
  #           matchExpressions:
  #             - key: app.kubernetes.io/component
  #               operator: In
  #               values: ["hushd"]
  #         topologyKey: kubernetes.io/hostname

# ---------------------------------------------------------------------------
# Bridge workloads
# ---------------------------------------------------------------------------
bridges:
  tetragon:
    enabled: false
    image:
      repository: ghcr.io/backbay-labs/clawdstrike/tetragon-bridge
      tag: ""
    grpcEndpoint: "http://localhost:54321"
    hostNetwork: true
    dnsPolicy: ClusterFirstWithHostNet
    env:
      RUST_LOG: "info,tetragon_bridge=debug"
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 250m
        memory: 256Mi
    # -- Node selector for bridge DaemonSet
    nodeSelector: {}
    tolerations: []

  hubble:
    enabled: false
    replicas: 1
    image:
      repository: ghcr.io/backbay-labs/clawdstrike/hubble-bridge
      tag: ""
    grpcEndpoint: "http://hubble-relay.kube-system.svc.cluster.local:4245"
    hostNetwork: false
    dnsPolicy: ClusterFirst
    env:
      RUST_LOG: "info,hubble_bridge=debug"
    resources:
      requests:
        cpu: 50m
        memory: 64Mi
      limits:
        cpu: 250m
        memory: 256Mi
    nodeSelector: {}
    tolerations: []

# ---------------------------------------------------------------------------
# Ingress
# ---------------------------------------------------------------------------
ingress:
  enabled: false
  className: ""
  commonAnnotations: {}
  hushd:
    enabled: true
    host: hushd.clawdstrike.local
    path: /
    pathType: Prefix
    annotations: {}
    tls: []
  proofsApi:
    enabled: true
    host: proofs-api.clawdstrike.local
    path: /
    pathType: Prefix
    annotations: {}
    tls: []

# ---------------------------------------------------------------------------
# Monitoring
# ---------------------------------------------------------------------------
serviceMonitor:
  enabled: false
  interval: 30s
  labels: {}
  endpoints:
    nats: true
    hushd: true
    proofsApi: false

# ---------------------------------------------------------------------------
# Network Policy
# ---------------------------------------------------------------------------
networkPolicy:
  enabled: false
  allowHubbleRelayEgress: true
  hubbleRelay:
    namespace: kube-system
    podSelector:
      k8s-app: hubble-relay
    ports:
      - 80
      - 4245

# ---------------------------------------------------------------------------
# RBAC
# ---------------------------------------------------------------------------
serviceAccount:
  create: true
  name: ""
  annotations: {}

# ---------------------------------------------------------------------------
# Autoscaling
# ---------------------------------------------------------------------------
autoscaling:
  # -- Enable HorizontalPodAutoscaler for hushd and proofs-api
  enabled: false
  hushd:
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
  proofsApi:
    minReplicas: 2
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70

# ---------------------------------------------------------------------------
# Pod Disruption Budget
# ---------------------------------------------------------------------------
podDisruptionBudget:
  # -- Enable PodDisruptionBudgets for hushd and proofs-api
  enabled: false
  hushd:
    minAvailable: 1
  proofsApi:
    minAvailable: 1

# ---------------------------------------------------------------------------
# Pod-level settings (applied to all components unless overridden)
# ---------------------------------------------------------------------------
podAnnotations: {}
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  capabilities:
    drop: [ALL]

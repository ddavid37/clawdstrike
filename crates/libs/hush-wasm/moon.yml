$schema: "https://moonrepo.dev/schemas/project.json"
type: "library"
language: "rust"
tags: ["wasm", "cross-language"]

tasks:
  build:
    command: "bash build.sh"
    platform: "system"
    inputs:
      - "build.sh"
      - "src/**/*"
      - "Cargo.toml"
      - "/Cargo.toml"
      - "/Cargo.lock"
      - "/crates/libs/hush-core/src/**/*"
      - "/crates/libs/hush-core/Cargo.toml"
    outputs:
      - "pkg"
      - "pkg-node"

  size-check:
    command: "bash"
    args:
      - "-c"
      - |
        size=$(wc -c < pkg/hush_wasm_bg.wasm | tr -d ' ')
        echo "WASM size: ${size} bytes (limit: 512000)"
        test "$size" -le 512000
    platform: "system"
    deps:
      - "~:build"
    inputs:
      - "pkg/hush_wasm_bg.wasm"

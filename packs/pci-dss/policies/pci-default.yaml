# PCI-DSS v4.0 Default Ruleset
# Balanced PCI compliance for development environments
# Ref: PCI-DSS v4.0 Requirements 3, 4, 6, 7, 10
version: "1.2.0"
name: PCI-DSS Default
description: Default PCI-DSS v4.0 compliance rules for development environments
extends: clawdstrike:default

guards:
  forbidden_path:
    patterns:
      # Standard sensitive paths
      - "**/.ssh/**"
      - "**/id_rsa*"
      - "**/id_ed25519*"
      - "**/.aws/**"
      - "**/.env"
      - "**/.env.*"
      - "**/.git-credentials"
      - "**/.gnupg/**"
      - "**/.kube/**"
      - "**/.docker/**"
      - "**/.npmrc"
      - "/etc/shadow"
      - "/etc/passwd"
      # PCI: Cardholder data directories
      - "**/cardholder/**"
      - "**/cardholder-data/**"
      - "**/card-data/**"
      - "**/payment-keys/**"
      - "**/hsm/**"
    exceptions:
      # Allow access to test card data fixtures
      - "**/test/fixtures/cards/**"
      - "**/tests/fixtures/cards/**"

  egress_allowlist:
    allow:
      # Payment processors
      - "api.stripe.com"
      - "*.braintreegateway.com"
      - "*.adyen.com"
      - "*.square.com"
      - "*.paypal.com"
      # Development tools
      - "api.github.com"
      - "github.com"
      - "*.npmjs.org"
      - "registry.npmjs.org"
      - "pypi.org"
      - "crates.io"
    block: []
    default_action: block

  secret_leak:
    patterns:
      - name: aws_access_key
        pattern: "AKIA[0-9A-Z]{16}"
        severity: critical
      - name: github_token
        pattern: "gh[ps]_[A-Za-z0-9]{36}"
        severity: critical
      - name: private_key
        pattern: "-----BEGIN\\s+(RSA\\s+)?PRIVATE\\s+KEY-----"
        severity: critical
      # PCI: Payment card patterns
      - name: visa_pan
        pattern: "\\b4\\d{3}[\\s-]?\\d{4}[\\s-]?\\d{4}[\\s-]?\\d{4}\\b"
        severity: critical
      - name: mastercard_pan
        pattern: "\\b5[1-5]\\d{2}[\\s-]?\\d{4}[\\s-]?\\d{4}[\\s-]?\\d{4}\\b"
        severity: critical
      - name: cvv
        pattern: "(?i)\\b(cvv|cvc|cvv2|cvc2|cid)[:\\s]*\\d{3,4}\\b"
        severity: critical
      - name: track_data
        pattern: "\\%B\\d{13,19}\\^"
        severity: critical
      - name: stripe_key
        pattern: "(?:sk|pk)_(test|live)_[A-Za-z0-9]{24,}"
        severity: critical
    skip_paths:
      - "**/test/**"
      - "**/tests/**"

  shell_command:
    enabled: true
    enforce_forbidden_paths: true
    forbidden_patterns:
      - "(?i)\\bmysqldump\\b"
      - "(?i)\\bpg_dump\\b"
      - "(?i)\\bmongodump\\b"
      - "(?i)\\btcpdump\\b"
      - "(?i)\\bwireshark\\b"
      - "(?i)\\btshark\\b"
      - "(?i)\\brm\\s+(-rf?|--recursive)\\s+/"
      - "(?i)\\bchmod\\s+777\\b"

  mcp_tool:
    allow: []
    block:
      - shell_exec
      - run_command
      - raw_file_write
      - raw_file_delete
    require_confirmation:
      - file_write
      - file_delete
    default_action: allow
    max_args_size: 1048576

  prompt_injection:
    enabled: true
    warn_at_or_above: suspicious
    block_at_or_above: high
    max_scan_bytes: 200000

  patch_integrity:
    max_additions: 1000
    max_deletions: 500
    require_balance: false
    max_imbalance_ratio: 10.0
    forbidden_patterns:
      - "(?i)disable[\\s_\\-]?(security|auth|ssl|tls|encryption|pci)"
      - "(?i)skip[\\s_\\-]?(verify|validation|check)"
      - "(?i)rm\\s+-rf\\s+/"
      - "(?i)chmod\\s+777"

settings:
  fail_fast: false
  verbose_logging: false
  session_timeout_secs: 3600

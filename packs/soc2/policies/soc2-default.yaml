# SOC2 Type II Default Ruleset
# Balanced SOC2 compliance for development environments
# Ref: SOC2 Trust Service Criteria (CC6, CC7, CC8)
version: "1.2.0"
name: SOC2 Default
description: Default SOC2 Type II compliance rules for development environments
extends: clawdstrike:default

guards:
  forbidden_path:
    patterns:
      # Standard sensitive paths
      - "**/.ssh/**"
      - "**/id_rsa*"
      - "**/id_ed25519*"
      - "**/.aws/**"
      - "**/.env"
      - "**/.env.*"
      - "**/.git-credentials"
      - "**/.gnupg/**"
      - "**/.kube/**"
      - "**/.docker/**"
      - "**/.npmrc"
      - "/etc/shadow"
      - "/etc/passwd"
      # SOC2: Audit and evidence directories
      - "**/audit-logs/**"
      - "**/audit_logs/**"
      - "**/evidence/**"
      - "**/compliance-reports/**"
      - "**/terraform.tfstate"
    exceptions:
      - "**/test/fixtures/audit/**"
      - "**/tests/fixtures/audit/**"

  egress_allowlist:
    allow:
      # AI APIs
      - "*.openai.com"
      - "*.anthropic.com"
      # Code hosting
      - "api.github.com"
      - "github.com"
      - "*.githubusercontent.com"
      # Package registries
      - "*.npmjs.org"
      - "registry.npmjs.org"
      - "pypi.org"
      - "crates.io"
    block: []
    default_action: block

  secret_leak:
    patterns:
      - name: aws_access_key
        pattern: "AKIA[0-9A-Z]{16}"
        severity: critical
      - name: github_token
        pattern: "gh[ps]_[A-Za-z0-9]{36}"
        severity: critical
      - name: openai_key
        pattern: "sk-[A-Za-z0-9]{48}"
        severity: critical
      - name: private_key
        pattern: "-----BEGIN\\s+(RSA\\s+)?PRIVATE\\s+KEY-----"
        severity: critical
      - name: generic_api_key
        pattern: "(?i)(api[_\\-]?key|apikey)\\s*[:=]\\s*[A-Za-z0-9]{32,}"
        severity: error
      - name: database_url
        pattern: "(?i)(postgres|mysql|mongodb|redis)://[^\\s]+"
        severity: critical
    skip_paths:
      - "**/test/**"
      - "**/tests/**"

  shell_command:
    enabled: true
    enforce_forbidden_paths: true
    forbidden_patterns:
      - "(?i)\\btruncate\\b"
      - "(?i)\\bshred\\b"
      - "(?i)\\bwipe\\b"
      - "(?i)\\brm\\s+(-rf?|--recursive)\\s+/"
      - "(?i)\\bchmod\\s+777\\b"

  mcp_tool:
    allow: []
    block:
      - shell_exec
      - run_command
      - raw_file_write
      - raw_file_delete
    require_confirmation:
      - file_write
      - file_delete
      - git_push
    default_action: allow
    max_args_size: 1048576

  prompt_injection:
    enabled: true
    warn_at_or_above: suspicious
    block_at_or_above: high
    max_scan_bytes: 200000

  patch_integrity:
    max_additions: 1000
    max_deletions: 500
    require_balance: false
    max_imbalance_ratio: 10.0
    forbidden_patterns:
      - "(?i)disable[\\s_\\-]?(security|auth|ssl|tls|logging|audit)"
      - "(?i)skip[\\s_\\-]?(verify|validation|check)"
      - "(?i)rm\\s+-rf\\s+/"
      - "(?i)chmod\\s+777"
      - "(?i)delete[_\\-]?logs"

settings:
  fail_fast: false
  verbose_logging: false
  session_timeout_secs: 3600

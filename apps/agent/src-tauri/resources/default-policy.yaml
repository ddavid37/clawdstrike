## Clawdstrike Agent - Default Policy
##
## This policy file is copied to the user's config directory on first run (if no policy exists).
## It uses the posture-aware AI agent ruleset for safe defaults (read-only by default, explicit
## user approvals for elevated capabilities).
version: "1.2.0"
name: "ai-agent-default"
description: "Default security policy for AI coding agents"
extends: clawdstrike:ai-agent-posture
merge_strategy: deep_merge

settings:
  fail_fast: true
  verbose_logging: false
  session_timeout_secs: 3600
